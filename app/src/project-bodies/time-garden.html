<p class="wp-block-paragraph">这是一个投射于墙面的自然装置，可以观察到通过时间、天气、语音、肢体动作等对自然场景产生各种影响，有纷飞的蝴蝶，野蛮生长的藤蔓，四个时间段的不同表现。</p>
