<svg width="950" height="320" viewBox="0 0 950 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MotionSheet — AE Bodymovin motion handoff table">
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="950" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e0e11"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="ms-glow" cx="0.74" cy="0.2" r="0.7">
      <stop stop-color="#e7503a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e7503a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ms-grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="950" height="320" fill="url(#ms-bg)"/>
  <rect width="950" height="320" fill="url(#ms-grid)"/>
  <rect width="950" height="320" fill="url(#ms-glow)"/>

  <!-- Left: wordmark + what it is -->
  <text x="56" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="5" fill="#e7503a">MOTION · CODE</text>

  <text x="54" y="172" font-family="Montserrat, 'Helvetica Neue', sans-serif" font-size="58" font-weight="800" letter-spacing="-1.5" fill="#f4f3ef">MotionSheet<tspan fill="#e7503a">.</tspan></text>

  <text x="57" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a1a1aa">AE Bodymovin → developer</text>
  <text x="57" y="231" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a1a1aa">motion handoff table</text>

  <text x="56" y="276" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="1" fill="#ff6f59">zerb.cc.cd ↗</text>

  <!-- Right: a stylized handoff table -->
  <g>
    <rect x="486" y="48" width="408" height="224" rx="14" fill="#141417" stroke="#26262b" stroke-width="1"/>

    <!-- window dots -->
    <circle cx="508" cy="72" r="4" fill="#e7503a"/>
    <circle cx="524" cy="72" r="4" fill="#3a3a42"/>
    <circle cx="540" cy="72" r="4" fill="#3a3a42"/>
    <line x1="486" y1="90" x2="894" y2="90" stroke="#26262b" stroke-width="1"/>

    <!-- header -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#71717a">
      <text x="510" y="120">ELEMENT</text>
      <text x="624" y="120">PROPERTY</text>
      <text x="746" y="120">DUR</text>
      <text x="824" y="120">EASE</text>
    </g>
    <line x1="510" y1="132" x2="870" y2="132" stroke="#26262b" stroke-width="1"/>

    <!-- rows -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#d4d4d8">
      <text x="510" y="162">hero</text>
      <text x="624" y="162">opacity</text>
      <text x="746" y="162" fill="#ff6f59">300</text>
      <path d="M824 166 C 836 166, 842 150, 858 150" stroke="#e7503a" stroke-width="2" fill="none" stroke-linecap="round"/>

      <text x="510" y="196">title</text>
      <text x="624" y="196">y</text>
      <text x="746" y="196" fill="#ff6f59">450</text>
      <path d="M824 200 C 830 200, 850 186, 858 186" stroke="#e7503a" stroke-width="2" fill="none" stroke-linecap="round"/>

      <text x="510" y="230">cta</text>
      <text x="624" y="230">scale</text>
      <text x="746" y="230" fill="#ff6f59">280</text>
      <path d="M824 234 C 840 234, 842 218, 858 218" stroke="#e7503a" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <line x1="510" y1="174" x2="870" y2="174" stroke="#26262b" stroke-width="0.5" stroke-opacity="0.6"/>
    <line x1="510" y1="208" x2="870" y2="208" stroke="#26262b" stroke-width="0.5" stroke-opacity="0.6"/>

    <!-- timeline strip -->
    <rect x="510" y="246" width="120" height="6" rx="3" fill="#e7503a" fill-opacity="0.9"/>
    <rect x="636" y="246" width="150" height="6" rx="3" fill="#3a3a42"/>
    <rect x="792" y="246" width="78" height="6" rx="3" fill="#3a3a42"/>
  </g>
</svg>
